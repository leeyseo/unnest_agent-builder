[project]
name = "agentengine"
version = "0.1.0"
description = "DAG 실행 엔진: 파서, toposort, 실행기, 이벤트"
requires-python = ">=3.12"
dependencies = ["pydantic>=2.7", "agentsdk"]

[tool.uv.sources]
agentsdk = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["agentengine"]
